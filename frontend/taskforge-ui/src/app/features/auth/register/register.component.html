<div class="auth-container">

    <mat-card class="auth-card">
  
      <h1 class="title">
        Create Account
      </h1>
  
      <p class="subtitle">
        Start managing your projects
      </p>
  
      <form
        [formGroup]="registerForm"
        (ngSubmit)="onSubmit()"
      >
  
        <mat-form-field
          appearance="outline"
          class="full-width"
        >
  
          <mat-label>Username</mat-label>
  
          <input
            matInput
            type="text"
            formControlName="username"
          />
  
        </mat-form-field>
  
        <mat-form-field
          appearance="outline"
          class="full-width"
        >
  
          <mat-label>Email</mat-label>
  
          <input
            matInput
            type="email"
            formControlName="email"
          />
  
        </mat-form-field>
  
        <mat-form-field
          appearance="outline"
          class="full-width"
        >
  
          <mat-label>Password</mat-label>
  
          <input
            matInput
            type="password"
            formControlName="password"
          />
  
        </mat-form-field>
  
        <button
          mat-flat-button
          color="primary"
          class="full-width register-btn"
          type="submit"
        >
  
          Create Account
  
        </button>
  
        <p
          *ngIf="successMessage"
          class="success"
        >
          {{ successMessage }}
        </p>
  
        <p
          *ngIf="errorMessage"
          class="error"
        >
          {{ errorMessage }}
        </p>
  
      </form>
  
      <div class="footer-text">
  
        Already have an account?
  
        <a routerLink="/login">
          Login
        </a>
  
      </div>
  
    </mat-card>
  
  </div>
