<div class="register-container">

    <mat-card>
  
      <h2>Create Account</h2>
  
      <form
        [formGroup]="registerForm"
        (ngSubmit)="onSubmit()"
      >
  
        <mat-form-field appearance="outline">
  
          <mat-label>Username</mat-label>
  
          <input
            matInput
            type="text"
            formControlName="username"
          />
  
        </mat-form-field>
  
        <mat-form-field appearance="outline">
  
          <mat-label>Email</mat-label>
  
          <input
            matInput
            type="email"
            formControlName="email"
          />
  
        </mat-form-field>
  
        <mat-form-field appearance="outline">
  
          <mat-label>Password</mat-label>
  
          <input
            matInput
            type="password"
            formControlName="password"
          />
  
        </mat-form-field>
  
        <button
          mat-raised-button
          color="primary"
          type="submit"
          [disabled]="loading"
        >
  
          Register
  
        </button>
  
        <p
          *ngIf="successMessage"
          class="success"
        >
          {{ successMessage }}
        </p>
  
        <p
          *ngIf="errorMessage"
          class="error"
        >
          {{ errorMessage }}
        </p>
  
      </form>
  
    </mat-card>
  
  </div>
