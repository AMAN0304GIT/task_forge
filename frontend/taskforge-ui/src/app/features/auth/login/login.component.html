<div class="login-container">

    <mat-card>
  
      <h2>TaskForge Login</h2>
  
      <form
        [formGroup]="loginForm"
        (ngSubmit)="onSubmit()"
      >
  
        <mat-form-field appearance="outline">
  
          <mat-label>Email</mat-label>
  
          <input
            matInput
            type="email"
            formControlName="email"
          />
  
        </mat-form-field>
  
        <mat-form-field appearance="outline">
  
          <mat-label>Password</mat-label>
  
          <input
            matInput
            type="password"
            formControlName="password"
          />
  
        </mat-form-field>
  
        <button
          mat-raised-button
          color="primary"
          type="submit"
          [disabled]="loading"
        >
  
          Login
  
        </button>
  
        <p
          *ngIf="errorMessage"
          class="error"
        >
          {{ errorMessage }}
        </p>
  
      </form>
  
    </mat-card>
  
  </div>
